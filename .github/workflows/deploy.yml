name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN permissions for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy at a time; cancel in-progress for newer commits
# but let an active deploy finish so the live site isn't left half-published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          GITHUB_PAGES: 'true'
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build

      # GitHub Pages will not serve files that begin with an underscore unless
      # we tell it not to run the Jekyll preprocessor — Next.js emits
      # /_next/* asset paths, so this is required.
      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
